<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة القحمة الرمضانية 28</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1976d2; --light-blue: #64b5f6; --bg: #1a1c1e; --gray-card: rgba(255, 255, 255, 0.04); --text-main: #eee; --text-muted: #aaa; --gold: #ffd700; --green: #25D366; --orange: #ff9800; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--blue); margin-bottom: 15px; }
        header h1 { color: var(--blue); font-weight: 900; margin: 0; font-size: 1.6rem; }
        .stadium-info { font-size: 0.85rem; color: var(--gold); margin-top: 8px; font-weight: bold; }
        .top-stats { display: flex; justify-content: flex-start; margin-bottom: 15px; padding-right: 5px; }
        .views-count { background: var(--gray-card); padding: 6px 20px; border-radius: 20px; border: 1px solid rgba(25,118,210,0.2); font-size: 0.85rem; }
        .tabs-nav { display: flex; justify-content: flex-start; background: var(--gray-card); padding: 8px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(25,118,210,0.2); overflow-x: auto; gap: 5px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-family: 'Cairo'; cursor: pointer; font-weight: bold; padding: 8px 18px; border-radius: 8px; transition: 0.3s; white-space: nowrap; font-size: 0.85rem; }
        .tab-btn.active { background: var(--blue); color: white; }
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .match-card { background: var(--gray-card); border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); padding: 15px 0; }
        .teams { display: flex; justify-content: space-between; align-items: center; padding: 0 15px; }
        .team { width: 42%; text-align: center; font-weight: bold; font-size: 1rem; }
        .vs { color: var(--blue); font-weight: 900; font-size: 1.2rem; }
        .day-header { background: rgba(25, 118, 210, 0.2); color: white; padding: 4px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; margin: 12px 0 8px; display: inline-block; border: 1px solid var(--blue); }
        
        .maintenance-box { text-align: center; padding: 50px 20px; background: rgba(255, 152, 0, 0.05); border: 1px dashed var(--orange); border-radius: 15px; margin-top: 10px; }
        .maintenance-box h3 { color: var(--orange); margin-bottom: 10px; }
        .maintenance-box p { color: var(--text-muted); font-size: 0.9rem; }

        .scorers-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .scorers-table td { padding: 10px 5px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .goal-count { background: var(--blue); color: white; padding: 1px 8px; border-radius: 10px; font-weight: bold; }
        
        .footer { text-align: center; padding: 30px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 20px; }
        .contact-link { color: var(--green); font-weight: 900; font-size: 0.9rem; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>بطولة القحمة الرمضانية 28</h1>
            <div class="stadium-info">جميع مباريات البطولة تقام على ملعب الوسم بالقحمة</div>
        </header>

        <div class="top-stats"><div class="views-count">👁️ المشاهدات: 8821</div></div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'today')">مباريات اليوم</button>
            <button class="tab-btn" onclick="openTab(event, 'upcoming')">النهائيات</button>
            <button class="tab-btn" onclick="openTab(event, 'scorers')">الهدافين</button>
            <button class="tab-btn" onclick="openTab(event, 'archive')">الأرشيف</button>
        </div>

        <div id="today" class="tab-content active"><div id="today-area"></div></div>
        <div id="upcoming" class="tab-content"><div id="upcoming-area"></div></div>
        <div id="scorers" class="tab-content">
            <div style="background: var(--gray-card); padding:15px; border-radius:12px;">
                <h3 style="color:var(--gold); border-bottom:1px solid rgba(255,215,0,0.1); padding-bottom:10px;">🏆 قائمة الهدافين</h3>
                <table class="scorers-table" id="scorers-list"></table>
            </div>
        </div>
        <div id="archive" class="tab-content"><div id="archive-area"></div></div>

        <div class="footer">
            <p style="font-size: 0.75rem;"><b>تطوير وتصميم: إياد عسيري</b></p>
            <a href="https://wa.me/966534987428" class="contact-link">📱 واتساب: 0534987428</a>
        </div>
    </div>

<script>
// تحديد الوقت الحالي
const now = new Date();
// نظام "4 الفجر": إذا كان الوقت قبل 4 الفجر، نعتبرنا في "يوم أمس"
if (now.getHours() < 4) now.setDate(now.getDate() - 1);
const todayStr = now.toISOString().split('T')[0];

const matchesData = [
    // القادم (الخميس والجمعة والسبت والنهائيات)
    { date: "2026-03-05", day: "الخميس 16 رمضان", t1: "الفيصلي", t2: "دبسا", info: "الملحق (استكمال) - 11:00 م", result: "1 - 0" },
    { date: "2026-03-06", day: "الجمعة 17 رمضان", t1: "الساحل الرياضي", t2: "ساحل مغزل", info: "ربع النهائي 1", result: "VS" },
    { date: "2026-03-06", day: "الجمعة 17 رمضان", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "ربع النهائي 2", result: "VS" },
    { date: "2026-03-07", day: "السبت 18 رمضان", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "ربع النهائي 3", result: "VS" },
    { date: "2026-03-07", day: "السبت 18 رمضان", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "ربع النهائي 4", result: "VS" },
    { date: "2026-03-10", day: "الثلاثاء 21 رمضان", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "نصف النهائي", result: "VS" },
    { date: "2026-03-13", day: "الجمعة 24 رمضان", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "النهائي الكبير 🏆", result: "VS" },

    // الأرشيف (تم نقل عمق هنا)
    { date: "2026-03-03", day: "الاثنين 13 رمضان", t1: "عمق", t2: "مستقبل عرمرم", info: "انتهت - الملحق", result: "3 - 0" },
    { date: "2026-03-01", day: "الأحد 12 رمضان", t1: "صقلية", t2: "عرمرم", info: "انتهت", result: "4 - 1" },
    { date: "2026-03-01", day: "الأحد 12 رمضان", t1: "الفيصلي", t2: "الوسام", info: "انتهت", result: "0 - 1" },
    { date: "2026-02-28", day: "السبت 11 رمضان", t1: "الصقر", t2: "العرق", info: "انتهت", result: "1 - 0" },
    { date: "2026-02-24", day: "الثلاثاء 07 رمضان", t1: "دبسا", t2: "عرمرم", info: "انتهت", result: "2 - 0" }
];

function init() {
    let sections = { today: "", upcoming: "", archive: "" };
    let hasToday = false;

    matchesData.forEach(m => {
        let html = `<div class="match-card"><div class="teams"><span class="team">${m.t1}</span><span class="vs">${m.result}</span><span class="team">${m.t2}</span></div><center><small style="color:var(--text-muted);">${m.info}</small></center></div>`;
        
        if (m.date === todayStr) {
            sections.today += html;
            hasToday = true;
        } else if (m.date > todayStr) {
            if (!sections.upcoming.includes(m.day)) sections.upcoming += `<div class="day-header">${m.day}</div>`;
            sections.upcoming += html;
        } else {
            if (!sections.archive.includes(m.day)) sections.archive += `<div class="day-header">${m.day}</div>`;
            sections.archive += html;
        }
    });

    // خانة اليوم: صيانة وكهرباء إذا لم توجد مباريات
    document.getElementById('today-area').innerHTML = hasToday ? sections.today : `
        <div class="maintenance-box">
            <h3>⚡ راحة وصيانة</h3>
            <p>لا توجد مباريات لليوم الثلاثاء والاربعاء<br>نظراً لأعمال الصيانة الشاملة لكهرباء <b>ملعب الوسم بالقحمة</b></p>
            <p style="color:var(--gold); font-size:0.8rem;">نلتقي يوم الخميس في استكمال الملحق</p>
        </div>`;

    document.getElementById('upcoming-area').innerHTML = sections.upcoming;
    document.getElementById('archive-area').innerHTML = sections.archive;

    // الهدافين
    const scorers = [
        {n:"أحمد شعبان", f:"عمق", g:3}, {n:"عبدالله معفري", f:"الوسام", g:2}, {n:"يحيى القوزي", f:"عمق", g:2},
        {n:"عمر المعشي", f:"عمق", g:1}, {n:"عبدالرحيم الهلالي", f:"دبسا", g:1}, {n:"سعيد علي الهلالي", f:"دبسا", g:1}
    ];
    document.getElementById('scorers-list').innerHTML = scorers.map(s => `<tr><td>${s.n} (${s.f})</td><td style="text-align:left"><span class="goal-count">${s.g}</span></td></tr>`).join('');
}

function openTab(evt, tabName) {
    let i, tabcontent = document.getElementsByClassName("tab-content"), tablinks = document.getElementsByClassName("tab-btn");
    for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
    for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
}

window.onload = init;
</script>
</body>
</html>
