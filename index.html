<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة القحمة الرمضانية 28 - أدوار الحسم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --blue-grad: linear-gradient(135deg, #1e3c72 0%, #1976d2 100%);
            --gold: #ffd700; 
            --bg: #0f1113; 
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff; 
            --text-muted: #b0b0b0;
            --green-neon: #2ecc71;
            --snap: #FFFC00; --tiktok: #ff0050;
        }
        
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; padding: 15px; }
        
        header { 
            text-align: center; padding: 35px 0; 
            background: var(--blue-grad); 
            border-bottom-left-radius: 30px; border-bottom-right-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px;
        }
        header h1 { font-weight: 900; margin: 0; font-size: 1.8rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.3); }
        .stadium-tag { color: var(--gold); font-size: 0.9rem; font-weight: 700; margin-top: 8px; display: block; }
        
        .info-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
        .stat-badge { 
            background: var(--card-bg); padding: 8px 18px; border-radius: 30px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.8rem; font-weight: 700;
            backdrop-filter: blur(10px);
        }
        .dot { height: 10px; width: 10px; background-color: var(--green-neon); border-radius: 50%; display: inline-block; box-shadow: 0 0 10px var(--green-neon); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
        
        .tabs-nav { 
            display: flex; background: var(--card-bg); padding: 5px; border-radius: 15px; 
            margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); overflow-x: auto;
        }
        .tab-btn { 
            background: none; border: none; color: var(--text-muted); font-family: 'Cairo'; 
            cursor: pointer; font-weight: 700; padding: 10px 15px; border-radius: 12px; 
            transition: 0.4s; white-space: nowrap; font-size: 0.85rem; flex: 1;
        }
        .tab-btn.active { background: var(--blue-grad); color: white; box-shadow: 0 5px 15px rgba(25,118,210,0.3); }

        .tab-content { display: none; animation: slideUp 0.5s ease-out; }
        .tab-content.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .match-card { 
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
            border-radius: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.08); 
            padding: 25px 15px; position: relative; overflow: hidden;
        }
        .match-card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--blue-grad); }
        
        .teams-row { display: flex; justify-content: space-around; align-items: center; }
        .team-item { width: 40%; text-align: center; font-weight: 900; font-size: 1.1rem; color: #fff; }
        .vs-label { 
            background: var(--blue-grad); color: white; padding: 5px 15px; border-radius: 10px;
            font-weight: 900; font-size: 1rem; box-shadow: 0 0 15px rgba(25,118,210,0.4);
        }
        .match-info { color: var(--gold); font-size: 0.8rem; font-weight: 700; margin-top: 15px; display: block; text-align: center; letter-spacing: 1px; }

        .comm-section { text-align: center; margin-top: 12px; padding-top: 10px; border-top: 1px solid rgba(255,215,0,0.1); }
        .comm-line { display: block; color: var(--gold); font-weight: 900; font-size: 0.85rem; line-height: 1.6; }

        .day-header { color: var(--text-muted); font-size: 0.85rem; font-weight: 700; margin: 25px 0 10px 10px; display: block; border-right: 3px solid var(--gold); padding-right: 10px; }

        .group-card { background: var(--card-bg); border-radius: 15px; overflow: hidden; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .group-header { background: rgba(255,255,255,0.05); color: var(--gold); padding: 15px; font-weight: 900; font-size: 1rem; }
        .group-table { width: 100%; border-collapse: collapse; }
        .group-table th { padding: 12px 5px; color: var(--text-muted); font-size: 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .group-table td { padding: 15px 5px; text-align: center; font-size: 0.85rem; color: #fff; }
        .pts-col { color: var(--gold); font-weight: 900; font-size: 1rem; }

        .scorers-table { width: 100%; border-collapse: collapse; }
        .scorer-name-box { text-align: right; padding: 15px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .goal-badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 8px; font-weight: 900; float: left; }

        .footer { text-align: center; padding: 40px 20px; background: rgba(0,0,0,0.3); margin-top: 50px; border-top-left-radius: 30px; border-top-right-radius: 30px; }
        .social-mini { display: flex; justify-content: center; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .social-btn { padding: 8px 15px; border-radius: 12px; text-decoration: none; font-size: 0.75rem; font-weight: 700; color: #fff; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>بطولة القحمة الرمضانية 28</h1>
            <span class="stadium-tag">🏆 أدوار الحسم - ملعب الوسم بالقحمة 🏆</span>
        </header>

        <div class="info-bar">
            <div class="stat-badge"><span class="dot"></span> النشاط: 11,432</div>
            <div class="stat-badge" id="weather-box">☁️ --°C</div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'today')">اليوم</button>
            <button class="tab-btn" onclick="openTab(event, 'upcoming')">النهائيات</button>
            <button class="tab-btn" onclick="openTab(event, 'scorers')">الهدافين</button>
            <button class="tab-btn" onclick="openTab(event, 'archive')">الأرشيف</button>
            <button class="tab-btn" onclick="openTab(event, 'groups')">المجموعات</button>
        </div>

        <div id="today" class="tab-content active"><div id="today-area"></div></div>
        <div id="upcoming" class="tab-content"><div id="upcoming-area"></div></div>
        <div id="scorers" class="tab-content">
            <div class="group-card">
                <div class="group-header">🏆 قائمة هدافي البطولة</div>
                <table class="scorers-table" id="scorers-list"></table>
            </div>
        </div>
        <div id="archive" class="tab-content"><div id="archive-area"></div></div>
        <div id="groups" class="tab-content"><div id="groups-area"></div></div>

        <div class="footer">
            <p style="font-size: 0.9rem; font-weight: 900; margin-bottom: 5px;">إعداد وبرمجة: إياد عسيري</p>
            <div class="social-mini">
                <a href="https://snapchat.com/t/TXTbTApk" target="_blank" class="social-btn" style="border-color:var(--snap)">👻 سناب إياد</a>
                <a href="https://wa.me/966534987428" target="_blank" class="social-btn" style="border-color:var(--green-neon)">💬 واتساب</a>
            </div>
            <p style="font-size: 0.7rem; color: var(--gold); margin-top: 25px; font-weight: bold;">📸 الشبكة الإعلامية للبطولة</p>
            <div class="social-mini">
                <a href="https://snapchat.com/t/2qKXdcpD" target="_blank" class="social-btn">👻 م. شداد</a>
                <a href="https://snapchat.com/t/rJe5ARXp" target="_blank" class="social-btn">👻 علي</a>
                <a href="https://snapchat.com/t/nreTp74h" target="_blank" class="social-btn">👻 رضي</a>
                <a href="https://snapchat.com/t/gcKhHU8e" target="_blank" class="social-btn">👻 علوش</a>
            </div>
        </div>
    </div>

<script>
async function fetchWeather() {
    try {
        const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=18.02&longitude=41.74&current_weather=true');
        const data = await response.json();
        document.getElementById('weather-box').innerHTML = `☁️ ${Math.round(data.current_weather.temperature)}°C - القحمة`;
    } catch (e) { document.getElementById('weather-box').innerHTML = `☁️ 24°C`; }
}

const groupData = [
    {n:"1", teams:[{t:"السوق",l:2,f:2,te:0,x:0,p:6},{t:"الفيض",l:2,f:0,te:1,x:1,p:1},{t:"جندلة",l:2,f:0,te:1,x:1,p:1}]},
    {n:"2", teams:[{t:"ساحل مغزل",l:2,f:2,te:0,x:0,p:6},{t:"البرك",l:2,f:1,te:0,x:1,p:3},{t:"وحدة الرقة",l:2,f:0,te:0,x:2,p:0}]},
    {n:"3", teams:[{t:"الصقر",l:2,f:2,te:0,x:0,p:6},{t:"عمق",l:2,f:1,te:0,x:1,p:3},{t:"العرق",l:2,f:0,te:0,x:2,p:0}]},
    {n:"4", teams:[{t:"الساحل الرياضي",l:2,f:2,te:0,x:0,p:6},{t:"مستقبل عرمرم",l:2,f:1,te:0,x:1,p:3},{t:"السلطان",l:2,f:0,te:0,x:2,p:0}]},
    {n:"5", teams:[{t:"الوسام",l:2,f:2,te:0,x:0,p:6},{t:"الفيصلي",l:2,f:1,te:0,x:1,p:3},{t:"خليج الصوالحة",l:2,f:0,te:0,x:2,p:0}]},
    {n:"6", teams:[{t:"صقلية",l:2,f:1,te:1,x:0,p:4},{t:"دبسا",l:2,f:1,te:1,x:0,p:4},{t:"عرمرم",l:2,f:0,te:0,x:2,p:0}]}
];

const matchesData = [
    { day: "الجمعة 17 رمضان", t1: "الساحل الرياضي", t2: "ساحل مغزل", info: "ربع النهائي 1", result: "VS", type: "up" },
    { day: "الجمعة 17 رمضان", t1: "الصقر", t2: "السوق", info: "ربع النهائي 2", result: "VS", type: "up", isCommMatch: true },
    { day: "السبت 18 رمضان", t1: "صقلية", t2: "الفيصلي", info: "ربع النهائي 3", result: "VS", type: "up" },
    { day: "السبت 18 رمضان", t1: "عمق", t2: "الوسام", info: "ربع النهائي 4", result: "VS", type: "up" },
    { day: "نصف النهائي", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "مواجهة 25", result: "VS", type: "up" },
    { day: "نصف النهائي", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "مواجهة 26", result: "VS", type: "up" },
    { day: "النهائي", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "مباراة 27", result: "VS", type: "up" },
    { day: "الخميس 16 رمضان", t1: "الفيصلي", t2: "دبسا", info: "انتهت", result: "1 - 0", type: "ar" },
    { day: "الاثنين 13 رمضان", t1: "عمق", t2: "مستقبل عرمرم", info: "انتهت", result: "3 - 0", type: "ar" },
    { day: "الأحد 12 رمضان", t1: "صقلية", t2: "عرمرم", info: "انتهت", result: "4 - 1", type: "ar" },
    { day: "الأحد 12 رمضان", t1: "الفيصلي", t2: "الوسام", info: "انتهت", result: "0 - 1", type: "ar" },
    { day: "السبت 11 رمضان", t1: "الصقر", t2: "العرق", info: "انتهت", result: "1 - 0", type: "ar" },
    { day: "السبت 11 رمضان", t1: "البرك", t2: "ساحل مغزل", info: "انتهت", result: "0 - 1", type: "ar" },
    { day: "الجمعة 10 رمضان", t1: "جندلة", t2: "الفيض", info: "انتهت", result: "2 - 2", type: "ar" },
    { day: "الخميس 09 رمضان", t1: "الساحل الرياضي", t2: "السلطان", info: "انتهت", result: "2 - 1", type: "ar" },
    { day: "الخميس 09 رمضان", t1: "صقلية", t2: "دبسا", info: "انتهت", result: "0 - 0", type: "ar" },
    { day: "الأربعاء 08 رمضان", t1: "الصقر", t2: "عمق", info: "انتهت", result: "2 - 1", type: "ar" },
    { day: "الثلاثاء 07 رمضان", t1: "السوق", t2: "الفيض", info: "انتهت", result: "1 - 0", type: "ar" },
    { day: "الثلاثاء 07 رمضان", t1: "دبسا", t2: "عرمرم", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الاثنين 06 رمضان", t1: "الوسام", t2: "الخليج", info: "انتهت", result: "4 - 1", type: "ar" },
    { day: "الاثنين 06 رمضان", t1: "عمق", t2: "العرق", info: "انتهت", result: "4 - 0", type: "ar" },
    { day: "الأحد 05 رمضان", t1: "مستقبل عرمرم", t2: "السلطان", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الأحد 05 رمضان", t1: "ساحل مغزل", t2: "وحدة الرقة", info: "انتهت", result: "3 - 1", type: "ar" },
    { day: "السبت 04 رمضان", t1: "السوق", t2: "جندلة", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الجمعة 03 رمضان", t1: "الفيصلي", t2: "خليج الصوالحة", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الخميس 02 رمضان", t1: "الساحل الرياضي", t2: "مستقبل عرمرم", info: "انتهت", result: "2 - 1", type: "ar" },
    { day: "الأربعاء 01 رمضان", t1: "البرك", t2: "وحدة الرقة", info: "انتهت", result: "2 - 1", type: "ar" }
];

function init() {
    fetchWeather();
    const finalScorers = [
        {n:"أحمد شعبان", f:"عمق", g:3}, {n:"عبدالله معفري", f:"الوسام", g:2}, {n:"عامر حزبي", f:"صقلية", g:2}, {n:"عبدالله العقيلي", f:"السوق", g:2},
        {n:"إبراهيم يحيى", f:"الساحل الرياضي", g:2}, {n:"نايف شرفي", f:"السوق", g:1}, {n:"عمر المعشي", f:"عمق", g:1}, 
        {n:"حسن بكري", f:"ساحل مغزل", g:1}, {n:"عبدالله عجيم", f:"ساحل مغزل", g:1}, {n:"خالد دماس", f:"ساحل مغزل", g:1}, {n:"حسن هداش", f:"ساحل مغزل", g:1},
        {n:"هادي عبدالرحمن", f:"الوحدة", g:1}, {n:"عبدالله يحيى", f:"مستقبل عرمرم", g:1}, {n:"رامي شوهان", f:"مستقبل عرمرم", g:1},
        {n:"ريان عسيري", f:"الصقر", g:1}, {n:"حماده شامي", f:"الصقر", g:1}, {n:"يحيى مهدلي", f:"الساحل الرياضي", g:1}, {n:"داني", f:"الساحل الرياضي", g:1},
        {n:"ابراهيم الزيادي", f:"السلطان", g:1}, {n:"مشعل الحسين", f:"جندلة", g:1}, {n:"محمد الحسين", f:"جندلة", g:1},
        {n:"حسن علي", f:"الفيض", g:1}, {n:"محمد سالم", f:"الفيض", g:1}, {n:"عواض الغشمي", f:"صقلية", g:1}, {n:"حسين معفري", f:"صقلية", g:1},
        {n:"مشعي مفرح", f:"عرمرم", g:1}, {n:"متعب معفري", f:"الوسام", g:1}, {n:"سلطان معفري", f:"الوسام", g:1}, {n:"محمد ابراهيم", f:"الوسام", g:1},
        {n:"احمد مبارك", f:"الخليج", g:1}, {n:"عبدالرحيم الهلالي", f:"دبسا", g:1}, {n:"سعيد علي الهلالي", f:"دبسا", g:1}
    ];
    finalScorers.sort((a,b) => b.g - a.g);
    document.getElementById('scorers-list').innerHTML = finalScorers.map(s => `<tr><td class="scorer-name-box">${s.n}<br><span style="color:var(--text-muted); font-size:0.7rem;">(${s.f})</span></td><td><span class="goal-badge">${s.g}</span></td></tr>`).join('');
    document.getElementById('groups-area').innerHTML = groupData.map(g => `<div class="group-card"><div class="group-header">المجموعة ${g.n}</div><table class="group-table"><thead><tr><th style="text-align:right; padding-right:15px;">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>ن</th></tr></thead><tbody>${g.teams.map(t => `<tr><td style="text-align:right; padding-right:15px; font-weight:700;">${t.t}</td><td>${t.l}</td><td>${t.f}</td><td>${t.te}</td><td>${t.x}</td><td class="pts-col">${t.p}</td></tr>`).join('')}</tbody></table></div>`).join('');
    updateDisplay();
}

function updateDisplay() {
    const now = new Date(), hours = now.getHours(), day = now.getDay();
    let todayHTML = "", upHTML = "", arHTML = "", upDays = [], arDays = [];
    const isTodayFri = (day === 5 && hours >= 4) || (day === 6 && hours < 4);
    const isTodaySat = (day === 6 && hours >= 4) || (day === 0 && hours < 4);

    matchesData.forEach(m => {
        let comms = (m.isCommMatch && isTodayFri) ? `<div class="comm-section"><span class="comm-line">🎙️ المعلق: نواف الغبيشي</span><span class="comm-line">🎙️ المعلق: عبدالمحسن مظفر</span></div>` : "";
        let card = `<div class="match-card"><div class="teams-row"><span class="team-item">${m.t1}</span><span class="vs-label">${m.result}</span><span class="team-item">${m.t2}</span></div><span class="match-info">${m.info}</span>${comms}</div>`;
        
        let inToday = false;
        if (isTodayFri && m.day === "الجمعة 17 رمضان") { todayHTML += card; inToday = true; }
        if (isTodaySat && m.day === "السبت 18 رمضان") { todayHTML += card; inToday = true; }

        if (m.type === "up" && !inToday) {
            if (!upDays.includes(m.day)) { upHTML += `<span class="day-header">${m.day}</span>`; upDays.push(m.day); }
            upHTML += card;
        } else if (m.type === "ar") {
            if (!arDays.includes(m.day)) { arHTML += `<span class="day-header">${m.day}</span>`; arDays.push(m.day); }
            arHTML += card;
        }
    });

    document.getElementById('today-area').innerHTML = todayHTML || `<div style="text-align:center; padding:40px; color:var(--text-muted);">لا توجد مباريات جارية حالياً</div>`;
    document.getElementById('upcoming-area').innerHTML = upHTML;
    document.getElementById('archive-area').innerHTML = arHTML;
}

function openTab(evt, tabName) {
    let i, tabcontent = document.getElementsByClassName("tab-content"), tablinks = document.getElementsByClassName("tab-btn");
    for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
    for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
}
window.onload = init;
</script>
</body>
</html>
