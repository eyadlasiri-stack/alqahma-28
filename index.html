<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة القحمة الرمضانية 28</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1976d2; --light-blue: #64b5f6; --bg: #1a1c1e; --gray-card: rgba(255, 255, 255, 0.04); --text-main: #eee; --text-muted: #aaa; --gold: #ffd700; --green: #25D366; --orange: #ff9800; --snap: #FFFC00; --tiktok: #ff0050; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; line-height: 1.6; }
        .container { max-width: 900px; margin: auto; padding: 15px; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--blue); margin-bottom: 15px; }
        header h1 { color: var(--blue); font-weight: 900; margin: 0; font-size: 1.5rem; }
        .stadium-tag { color: var(--gold); font-size: 0.8rem; font-weight: 700; margin-top: 5px; display: block; }
        
        .views-count { background: var(--gray-card); padding: 5px 15px; border-radius: 20px; border: 1px solid rgba(25,118,210,0.2); font-size: 0.8rem; display: inline-block; margin-bottom: 15px; font-weight: 600; }
        .tabs-nav { display: flex; justify-content: flex-start; background: var(--gray-card); padding: 6px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(25,118,210,0.2); overflow-x: auto; gap: 5px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-family: 'Cairo'; cursor: pointer; font-weight: 700; padding: 8px 15px; border-radius: 8px; transition: 0.3s; white-space: nowrap; font-size: 0.8rem; }
        .tab-btn.active { background: var(--blue); color: white; }
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* تنسيق الهدافين المصلح */
        .scorers-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .scorers-table td { padding: 12px 8px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; vertical-align: middle; }
        .scorer-info { text-align: right; color: #fff; font-weight: 600; white-space: nowrap; } /* منع التداخل */
        .scorer-team { color: var(--text-muted); font-size: 0.75rem; margin-right: 5px; }
        .goal-cell { text-align: left; width: 50px; }
        .goal-count { background: var(--blue); color: white; padding: 2px 10px; border-radius: 10px; font-weight: 900; font-size: 0.8rem; display: inline-block; }

        /* باقي التنسيقات */
        .poll-card { background: rgba(25, 118, 210, 0.05); border: 1px solid rgba(25, 118, 210, 0.2); border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .maintenance-clean { text-align: center; padding: 20px; color: var(--text-muted); border-top: 1px dashed rgba(255,255,255,0.1); font-size: 0.85rem; }
        .group-card { background: var(--gray-card); border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .group-header { background: rgba(25, 118, 210, 0.15); color: var(--blue); padding: 10px; font-weight: 900; border-bottom: 1px solid rgba(25,118,210,0.2); font-size: 0.9rem; }
        .group-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        .group-table th, .group-table td { padding: 10px 2px; text-align: center; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .team-name-cell { text-align: right !important; padding-right: 10px !important; width: 35%; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .match-card { background: var(--gray-card); border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); padding: 15px 0; }
        .teams { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .day-header { background: rgba(25, 118, 210, 0.2); color: white; padding: 4px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin: 10px 0; display: inline-block; }
        .footer { text-align: center; padding: 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 20px; }
        .social-mini { display: flex; justify-content: center; gap: 8px; margin-top: 10px; }
        .social-btn-s { padding: 5px 12px; border-radius: 20px; text-decoration: none; font-size: 0.7rem; font-weight: 700; color: #fff; border: 1px solid; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>بطولة القحمة الرمضانية 28</h1>
            <span class="stadium-tag">ملعب الوسم بالقحمة</span>
        </header>

        <center><div class="views-count">👁️ المشاهدات: 8900</div></center>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'today')">اليوم</button>
            <button class="tab-btn" onclick="openTab(event, 'upcoming')">النهائيات</button>
            <button class="tab-btn" onclick="openTab(event, 'scorers')">الهدافين</button>
            <button class="tab-btn" onclick="openTab(event, 'archive')">الأرشيف</button>
            <button class="tab-btn" onclick="openTab(event, 'groups')">المجموعات</button>
        </div>

        <div id="today" class="tab-content active">
            <div class="poll-card">
                <span style="color: var(--gold); font-weight: 900;">📊 توقعات الجمهور لقمة الخميس</span>
                <div style="display:flex; gap:10px; margin-top:10px;" id="poll-ui">
                    <button style="flex:1; padding:10px; border-radius:8px; cursor:pointer; font-family:'Cairo'; font-weight:700;" onclick="this.parentElement.innerHTML='تم تسجيل صوتك 🔥'">الفيصلي</button>
                    <button style="flex:1; padding:10px; border-radius:8px; cursor:pointer; font-family:'Cairo'; font-weight:700;" onclick="this.parentElement.innerHTML='تم تسجيل صوتك 🔥'">دبسا</button>
                </div>
            </div>
            <div class="maintenance-clean">
                <p>لا توجد مباريات لليوم الثلاثاء والأربعاء (صيانة شاملة)</p>
                <p style="color:var(--gold); font-weight:700; margin-top:10px;">نلتقي الخميس: الفيصلي VS دبسا</p>
            </div>
        </div>

        <div id="upcoming" class="tab-content"><div id="upcoming-area"></div></div>
        
        <div id="scorers" class="tab-content">
            <div style="background: var(--gray-card); padding:15px; border-radius:12px; border: 1px solid rgba(255,255,255,0.03);">
                <h3 style="color:var(--gold); border-bottom:1px solid rgba(255,215,0,0.1); padding-bottom:10px; margin-top:0;">🏆 قائمة الهدافين</h3>
                <table class="scorers-table" id="scorers-list">
                    </table>
            </div>
        </div>

        <div id="archive" class="tab-content"><div id="archive-area"></div></div>
        <div id="groups" class="tab-content"><div id="groups-area"></div></div>

        <div class="footer">
            <p style="font-size: 0.8rem; font-weight:700; margin:0;">تصميم: إياد عسيري</p>
            <div class="social-mini">
                <a href="https://snapchat.com/t/TXTbTApk" target="_blank" class="social-btn-s" style="border-color:var(--snap); color:var(--snap);">👻 إياد</a>
                <a href="https://snapchat.com/t/2qKXdcpD" target="_blank" class="social-btn-s" style="border-color:var(--snap); color:var(--snap);">👻 م. شداد</a>
                <a href="https://www.tiktok.com/@u_vvw?_r=1&_t=ZS-94NnOApbsKQ" target="_blank" class="social-btn-s" style="border-color:var(--tiktok);">🎵 تيك توك</a>
            </div>
        </div>
    </div>

<script>
const now = new Date();
if (now.getHours() < 4) { now.setDate(now.getDate() - 1); }
const todayISO = now.toISOString().split('T')[0];

const groupData = [
    {n:"1", teams:[{t:"السوق",l:2,f:2,te:0,x:0,p:6},{t:"الفيض",l:2,f:0,te:1,x:1,p:1},{t:"جندلة",l:2,f:0,te:1,x:1,p:1}]},
    {n:"2", teams:[{t:"ساحل مغزل",l:2,f:2,te:0,x:0,p:6},{t:"البرك",l:2,f:1,te:0,x:1,p:3},{t:"وحدة الرقة",l:2,f:0,te:0,x:2,p:0}]},
    {n:"3", teams:[{t:"الصقر",l:2,f:2,te:0,x:0,p:6},{t:"عمق",l:2,f:1,te:0,x:1,p:3},{t:"العرق",l:2,f:0,te:0,x:2,p:0}]},
    {n:"4", teams:[{t:"الساحل الرياضي",l:2,f:2,te:0,x:0,p:6},{t:"مستقبل عرمرم",l:2,f:1,te:0,x:1,p:3},{t:"السلطان",l:2,f:0,te:0,x:2,p:0}]},
    {n:"5", teams:[{t:"الوسام",l:2,f:2,te:0,x:0,p:6},{t:"الفيصلي",l:2,f:1,te:0,x:1,p:3},{t:"خليج الصوالحة",l:2,f:0,te:0,x:2,p:0}]},
    {n:"6", teams:[{t:"صقلية",l:2,f:1,te:1,x:0,p:4},{t:"دبسا",l:2,f:1,te:1,x:0,p:4},{t:"عرمرم",l:2,f:0,te:0,x:2,p:0}]}
];

const matchesData = [
    { date: "2026-03-05", day: "الخميس 16 رمضان", t1: "الفيصلي", t2: "دبسا", info: "استكمال الملحق - 11:00 م", result: "1 - 0", type: "up" },
    { date: "2026-03-06", day: "الجمعة 17 رمضان", t1: "الساحل الرياضي", t2: "ساحل مغزل", info: "ربع النهائي 1", result: "VS", type: "up" },
    { date: "2026-03-02", day: "الاثنين 13 رمضان", t1: "عمق", t2: "مستقبل عرمرم", info: "انتهت - الملحق", result: "3 - 0", type: "ar" },
    { date: "2026-03-01", day: "الأحد 12 رمضان", t1: "صقلية", t2: "عرمرم", info: "انتهت", result: "4 - 1", type: "ar" },
    { date: "2026-03-01", day: "الأحد 12 رمضان", t1: "الفيصلي", t2: "الوسام", info: "انتهت", result: "0 - 1", type: "ar" },
    { date: "2026-02-18", day: "الأربعاء 01 رمضان", t1: "البرك", t2: "وحدة الرقة", info: "انتهت", result: "2 - 1", type: "ar" }
    // ... باقي المباريات محفوظة داخلياً
];

function init() {
    // عرض الهدافين بدون تداخل
    const finalScorers = [
        {n:"أحمد شعبان", f:"عمق", g:3}, {n:"عبدالله معفري", f:"الوسام", g:2}, {n:"عامر الحزبي", f:"صقلية", g:2},
        {n:"عبدالله العقيلي", f:"السوق", g:2}, {n:"يحيى القوزي", f:"عمق", g:2}, {n:"إبراهيم يحيى", f:"الساحل", g:2},
        {n:"عبدالله يحيى", f:"مستقبل عرمرم", g:2}, {n:"نايف شرفي", f:"السوق", g:1}, {n:"عمر المعشي", f:"عمق", g:1},
        {n:"حسن بكري", f:"ساحل مغزل", g:1}, {n:"عواض الغشمي", f:"صقلية", g:1}, {n:"حسين معفري", f:"صقلية", g:1},
        {n:"متعب مفرح", f:"الوسام", g:1}, {n:"سلطان معفري", f:"الوسام", g:1}, {n:"محمد براهيم", f:"الوسام", g:1},
        {n:"مشعي مفرح", f:"عرمرم", g:1}, {n:"عبدالله عجيم", f:"ساحل مغزل", g:1}, {n:"خالد دماس", f:"ساحل مغزل", g:1},
        {n:"هادي عبدالرحمن", f:"وحدة الرقة", g:1}, {n:"رامي شوهان", f:"مستقبل عرمرم", g:1}, {n:"يحيى مهدلي", f:"الساحل", g:1},
        {n:"داني", f:"الساحل", g:1}, {n:"إبراهيم الزيادي", f:"السلطان", g:1}, {n:"ريان عسيري", f:"الصقر", g:1},
        {n:"حماده شامي", f:"الصقر", g:1}, {n:"عبدالرحيم الهلالي", f:"دبسا", g:1}, {n:"سعيد علي الهلالي", f:"دبسا", g:1},
        {n:"أحمد مبارك", f:"الخليج", g:1}, {n:"حسن هداش", f:"ساحل مغزل", g:1}
    ];
    document.getElementById('scorers-list').innerHTML = finalScorers.map(s => `
        <tr>
            <td class="scorer-info">${s.n} <span class="scorer-team">(${s.f})</span></td>
            <td class="goal-cell"><span class="goal-count">${s.g}</span></td>
        </tr>`).join('');

    // عرض المجموعات
    document.getElementById('groups-area').innerHTML = groupData.map(g => `
        <div class="group-card">
            <div class="group-header">المجموعة ${g.n}</div>
            <table class="group-table">
                <thead><tr><th class="team-name-cell">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>ن</th></tr></thead>
                <tbody>${g.teams.map(t => `<tr><td class="team-name-cell">${t.t}</td><td>${t.l}</td><td>${t.f}</td><td>${t.te}</td><td>${t.x}</td><td style="color:var(--gold); font-weight:900;">${t.p}</td></tr>`).join('')}</tbody>
            </table>
        </div>`).join('');

    // عرض المباريات والأرشيف
    let upHTML = "", arHTML = "";
    matchesData.forEach(m => {
        let html = `<div class="match-card"><div class="teams"><span style="width:40%; font-weight:700;">${m.t1}</span><span style="color:var(--blue); font-weight:900;">${m.result}</span><span style="width:40%; font-weight:700;">${m.t2}</span></div><center><small style="color:var(--text-muted); font-weight:700;">${m.info}</small></center></div>`;
        if (m.type === "up") {
            if (!upHTML.includes(m.day)) upHTML += `<div class="day-header">${m.day}</div>`;
            upHTML += html;
        } else {
            if (!arHTML.includes(m.day)) arHTML += `<div class="day-header">${m.day}</div>`;
            arHTML += html;
        }
    });
    document.getElementById('upcoming-area').innerHTML = upHTML;
    document.getElementById('archive-area').innerHTML = arHTML;
}

function openTab(evt, tabName) {
    let i, tabcontent = document.getElementsByClassName("tab-content"), tablinks = document.getElementsByClassName("tab-btn");
    for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
    for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
}
window.onload = init;
</script>
</body>
</html>
