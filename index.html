<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة القحمة الرمضانية 28 - نسخة البريميوم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --premium-blue: #0a192f;
            --accent-blue: #00d2ff;
            --gold-king: #d4af37;
            --glass: rgba(255, 255, 255, 0.03);
            --text-pure: #ffffff;
            --text-gold: #f1c40f;
            --snap: #FFFC00; --tiktok: #ff0050;
        }
        
        body { 
            background: radial-gradient(circle at top, #1a365d 0%, #0a1118 100%);
            color: var(--text-pure); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; min-height: 100vh;
        }
        
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        header { 
            text-align: center; padding: 40px 20px; 
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
            border-bottom: 2px solid var(--gold-king); margin-bottom: 30px;
        }
        header h1 { font-weight: 900; font-size: 2rem; letter-spacing: 1px; color: var(--text-gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.4); }
        .stadium-tag { color: #fff; font-size: 0.9rem; opacity: 0.8; margin-top: 10px; font-weight: 600; }

        .info-bar { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .stat-badge { 
            background: var(--glass); padding: 10px 20px; border-radius: 15px; 
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; font-weight: 700;
            backdrop-filter: blur(15px); display: flex; align-items: center; gap: 8px;
        }
        .dot { height: 12px; width: 12px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 15px #00ff88; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }

        .tabs-nav { 
            display: flex; background: rgba(0,0,0,0.3); padding: 6px; border-radius: 20px; 
            margin-bottom: 30px; border: 1px solid rgba(255,215,0,0.2); overflow-x: auto;
        }
        .tab-btn { 
            background: none; border: none; color: #888; font-family: 'Cairo'; 
            cursor: pointer; font-weight: 700; padding: 12px 25px; border-radius: 15px; 
            transition: 0.5s; white-space: nowrap; flex: 1;
        }
        .tab-btn.active { background: var(--gold-king); color: #000; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.4); }

        .match-card { 
            background: linear-gradient(145deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 100%);
            border-radius: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.08); 
            padding: 30px 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .teams-row { display: flex; justify-content: space-between; align-items: center; }
        .team-item { width: 35%; text-align: center; font-weight: 900; font-size: 1.2rem; color: #fff; }
        .vs-box { 
            width: 60px; height: 60px; background: #000; border: 2px solid var(--gold-king);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: var(--gold-king); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .match-info { color: var(--accent-blue); font-size: 0.85rem; font-weight: 700; margin-top: 20px; display: block; text-align: center; text-transform: uppercase; }

        .day-header { color: var(--gold-king); font-size: 0.9rem; font-weight: 900; margin: 30px 10px 15px; display: flex; align-items: center; gap: 10px; }
        .day-header::after { content: ""; flex: 1; height: 1px; background: linear-gradient(to left, var(--gold-king), transparent); }

        .group-card { background: var(--glass); border-radius: 20px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.05); }
        .group-header { padding: 15px 20px; font-weight: 900; color: var(--gold-king); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .group-table { width: 100%; border-collapse: collapse; }
        .group-table td { padding: 15px 10px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .pts-col { color: var(--gold-king); font-weight: 900; }

        .footer { text-align: center; padding: 50px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 60px; }
        .social-btn { 
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; 
            border-radius: 15px; text-decoration: none; color: #fff; font-size: 0.8rem; font-weight: 700;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); margin: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>بطولة القحمة الرمضانية 28</h1>
            <span class="stadium-tag">🔱 نسخة الحسم البريميوم - ملعب الوسم 🔱</span>
        </header>

        <div class="info-bar">
            <div class="stat-badge"><span class="dot"></span> نشاط القمة: 11,432</div>
            <div class="stat-badge" id="weather-box">☁️ --°C</div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'today')">اليوم</button>
            <button class="tab-btn" onclick="openTab(event, 'upcoming')">النهائيات</button>
            <button class="tab-btn" onclick="openTab(event, 'scorers')">الهدافين</button>
            <button class="tab-btn" onclick="openTab(event, 'archive')">الأرشيف</button>
            <button class="tab-btn" onclick="openTab(event, 'groups')">المجموعات</button>
        </div>

        <div id="today" class="tab-content active"><div id="today-area"></div></div>
        <div id="upcoming" class="tab-content"><div id="upcoming-area"></div></div>
        <div id="scorers" class="tab-content">
            <div class="group-card">
                <div class="group-header">🎖️ لوحة الشرف - الهدافين</div>
                <table id="scorers-list" style="width:100%"></table>
            </div>
        </div>
        <div id="archive" class="tab-content"><div id="archive-area"></div></div>
        <div id="groups" class="tab-content"><div id="groups-area"></div></div>

        <div class="footer">
            <p style="font-weight:900; letter-spacing:1px; color:var(--gold-king)">التغطية الفنية: إياد عسيري</p>
            <div class="social-mini">
                <a href="https://snapchat.com/t/TXTbTApk" class="social-btn" style="border-color:var(--snap)">سناب إياد</a>
                <a href="https://www.tiktok.com/@u_vvw?_r=1&_t=ZS-94NnOApbsKQ" class="social-btn" style="border-color:var(--tiktok)">تيك توك</a>
                <a href="https://wa.me/966534987428" class="social-btn" style="border-color:#25D366">واتساب</a>
            </div>
            <p style="margin-top:30px; font-size:0.75rem; color:var(--gold-king); font-weight:bold">الشبكة الإعلامية</p>
            <div class="social-mini">
                <a href="https://snapchat.com/t/2qKXdcpD" class="social-btn">م. شداد</a>
                <a href="https://snapchat.com/t/rJe5ARXp" class="social-btn">علي</a>
                <a href="https://snapchat.com/t/nreTp74h" class="social-btn">رضي</a>
                <a href="https://snapchat.com/t/gcKhHU8e" class="social-btn">علوش</a>
            </div>
            <p style="font-size:0.55rem; color:#555; margin-top:40px;">كافة النتائج مجهود شخصي | بطولة القحمة 28</p>
        </div>
    </div>

<script>
async function fetchWeather() {
    try {
        const response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=18.02&longitude=41.74&current_weather=true');
        const data = await response.json();
        document.getElementById('weather-box').innerHTML = `☁️ ${Math.round(data.current_weather.temperature)}°C - القحمة`;
    } catch (e) { document.getElementById('weather-box').innerHTML = `☁️ 24°C`; }
}

const groupData = [
    {n:"1", teams:[{t:"السوق",l:2,f:2,te:0,x:0,p:6},{t:"الفيض",l:2,f:0,te:1,x:1,p:1},{t:"جندلة",l:2,f:0,te:1,x:1,p:1}]},
    {n:"2", teams:[{t:"ساحل مغزل",l:2,f:2,te:0,x:0,p:6},{t:"البرك",l:2,f:1,te:0,x:1,p:3},{t:"وحدة الرقة",l:2,f:0,te:0,x:2,p:0}]},
    {n:"3", teams:[{t:"الصقر",l:2,f:2,te:0,x:0,p:6},{t:"عمق",l:2,f:1,te:0,x:1,p:3},{t:"العرق",l:2,f:0,te:0,x:2,p:0}]},
    {n:"4", teams:[{t:"الساحل الرياضي",l:2,f:2,te:0,x:0,p:6},{t:"مستقبل عرمرم",l:2,f:1,te:0,x:1,p:3},{t:"السلطان",l:2,f:0,te:0,x:2,p:0}]},
    {n:"5", teams:[{t:"الوسام",l:2,f:2,te:0,x:0,p:6},{t:"الفيصلي",l:2,f:1,te:0,x:1,p:3},{t:"خليج الصوالحة",l:2,f:0,te:0,x:2,p:0}]},
    {n:"6", teams:[{t:"صقلية",l:2,f:1,te:1,x:0,p:4},{t:"دبسا",l:2,f:1,te:1,x:0,p:4},{t:"عرمرم",l:2,f:0,te:0,x:2,p:0}]}
];

const matchesData = [
    { day: "الجمعة 17 رمضان", t1: "الساحل الرياضي", t2: "ساحل مغزل", info: "ربع النهائي - قمة 1", result: "VS", type: "up" },
    { day: "الجمعة 17 رمضان", t1: "الصقر", t2: "السوق", info: "ربع النهائي - قمة 2", result: "VS", type: "up" },
    { day: "السبت 18 رمضان", t1: "صقلية", t2: "الفيصلي", info: "ربع النهائي - قمة 3", result: "VS", type: "up" },
    { day: "السبت 18 رمضان", t1: "عمق", t2: "الوسام", info: "ربع النهائي - قمة 4", result: "VS", type: "up" },
    { day: "نصف النهائي", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "الذهاب إلى النهائي", result: "VS", type: "up" },
    { day: "نصف النهائي", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "الذهاب إلى النهائي", result: "VS", type: "up" },
    { day: "النهائي الكبير", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "بطل القحمة 28", result: "VS", type: "up" },
    { day: "الخميس 16 رمضان", t1: "الفيصلي", t2: "دبسا", info: "انتهت", result: "1 - 0", type: "ar" },
    { day: "الاثنين 13 رمضان", t1: "عمق", t2: "مستقبل عرمرم", info: "انتهت", result: "3 - 0", type: "ar" },
    { day: "الأحد 12 رمضان", t1: "صقلية", t2: "عرمرم", info: "انتهت", result: "4 - 1", type: "ar" },
    { day: "الأحد 12 رمضان", t1: "الفيصلي", t2: "الوسام", info: "انتهت", result: "0 - 1", type: "ar" },
    { day: "السبت 11 رمضان", t1: "الصقر", t2: "العرق", info: "انتهت", result: "1 - 0", type: "ar" },
    { day: "السبت 11 رمضان", t1: "البرك", t2: "ساحل مغزل", info: "انتهت", result: "0 - 1", type: "ar" },
    { day: "الجمعة 10 رمضان", t1: "جندلة", t2: "الفيض", info: "انتهت", result: "2 - 2", type: "ar" },
    { day: "الخميس 09 رمضان", t1: "الساحل الرياضي", t2: "السلطان", info: "انتهت", result: "2 - 1", type: "ar" },
    { day: "الخميس 09 رمضان", t1: "صقلية", t2: "دبسا", info: "انتهت", result: "0 - 0", type: "ar" },
    { day: "الأربعاء 08 رمضان", t1: "الصقر", t2: "عمق", info: "انتهت", result: "2 - 1", type: "ar" },
    { day: "الثلاثاء 07 رمضان", t1: "السوق", t2: "الفيض", info: "انتهت", result: "1 - 0", type: "ar" },
    { day: "الثلاثاء 07 رمضان", t1: "دبسا", t2: "عرمرم", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الاثنين 06 رمضان", t1: "الوسام", t2: "الخليج", info: "انتهت", result: "4 - 1", type: "ar" },
    { day: "الاثنين 06 رمضان", t1: "عمق", t2: "العرق", info: "انتهت", result: "4 - 0", type: "ar" },
    { day: "الأحد 05 رمضان", t1: "مستقبل عرمرم", t2: "السلطان", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الأحد 05 رمضان", t1: "ساحل مغزل", t2: "وحدة الرقة", info: "انتهت", result: "3 - 1", type: "ar" },
    { day: "السبت 04 رمضان", t1: "السوق", t2: "جندلة", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الجمعة 03 رمضان", t1: "الفيصلي", t2: "خليج الصوالحة", info: "انتهت", result: "2 - 0", type: "ar" },
    { day: "الخميس 02 رمضان", t1: "الساحل الرياضي", t2: "مستقبل عرمرم", info: "انتهت", result: "2 - 1", type: "ar" },
    { day: "الأربعاء 01 رمضان", t1: "البرك", t2: "وحدة الرقة", info: "انتهت", result: "2 - 1", type: "ar" }
];

function init() {
    fetchWeather();
    const finalScorers = [
        {n:"أحمد شعبان", f:"عمق", g:3}, {n:"عبدالله معفري", f:"الوسام", g:2}, {n:"عامر الحزبي", f:"صقلية", g:2}, {n:"عبدالله العقيلي", f:"السوق", g:2},
        {n:"يحيى القوزي", f:"عمق", g:2}, {n:"إبراهيم يحيى", f:"الساحل الرياضي", g:2}, {n:"عبدالله يحيى", f:"مستقبل عرمرم", g:2}, {n:"نايف شرفي", f:"السوق", g:1}, 
        {n:"عمر المعشي", f:"عمق", g:1}, {n:"حسن بكري", f:"ساحل مغزل", g:1}, {n:"عواض الغشمي", f:"صقلية", g:1}, {n:"حسين معفري", f:"صقلية", g:1}, 
        {n:"متعب مفرح", f:"الوسام", g:1}, {n:"سلطان معفري", f:"الوسام", g:1}, {n:"محمد براهيم", f:"الوسام", g:1}, {n:"مشعي مفرح", f:"عرمرم", g:1}, 
        {n:"عبدالله عجيم", f:"ساحل مغزل", g:1}, {n:"خالد دماس", f:"ساحل مغزل", g:1}, {n:"هادي عبدالرحمن", f:"وحدة الرقة", g:1}, 
        {n:"رامي شوهان", f:"مستقبل عرمرم", g:1}, {n:"يحيى مهدلي", f:"الساحل الرياضي", g:1}, {n:"داني", f:"الساحل الرياضي", g:1}, 
        {n:"إبراهيم الزيادي", f:"السلطان", g:1}, {n:"ريان عسيري", f:"الصقر", g:1}, {n:"حماده شامي", f:"الصقر", g:1}, 
        {n:"عبدالرحيم الهلالي", f:"دبسا", g:1}, {n:"سعيد علي الهلالي", f:"دبسا", g:1}, {n:"أحمد مبارك", f:"الخليج", g:1}, {n:"حسن هداش", f:"ساحل مغزل", g:1}
    ];
    document.getElementById('scorers-list').innerHTML = finalScorers.map(s => `<tr><td style="padding:15px; text-align:right; font-weight:700;">${s.n}<br><span style="color:#666; font-size:0.7rem;">(${s.f})</span></td><td style="padding:15px;"><span style="background:var(--gold-king); color:#000; padding:4px 12px; border-radius:8px; font-weight:900; float:left;">${s.g}</span></td></tr>`).join('');
    document.getElementById('groups-area').innerHTML = groupData.map(g => `<div class="group-card"><div class="group-header">المجموعة ${g.n}</div><table class="group-table"><thead><tr><th style="text-align:right; padding-right:20px; font-size:0.75rem;">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>ن</th></tr></thead><tbody>${g.teams.map(t => `<tr><td style="text-align:right; padding-right:20px; font-weight:900;">${t.t}</td><td>${t.l}</td><td>${t.f}</td><td>${t.te}</td><td>${t.x}</td><td class="pts-col">${t.p}</td></tr>`).join('')}</tbody></table></div>`).join('');
    updateDisplay();
}

function updateDisplay() {
    const now = new Date(), hrs = now.getHours(), day = now.getDay();
    let todayH = "", upH = "", arH = "", upDays = [], arDays = [];
    const isFri = (day === 5 && hrs >= 4) || (day === 6 && hrs < 4);
    const isSat = (day === 6 && hrs >= 4) || (day === 0 && hrs < 4);

    matchesData.forEach(m => {
        let card = `<div class="match-card"><div class="teams-row"><span class="team-item">${m.t1}</span><div class="vs-box">VS</div><span class="team-item">${m.t2}</span></div><span class="match-info">${m.info}</span></div>`;
        let inT = false;
        if (isFri && m.day === "الجمعة 17 رمضان") { todayH += card; inT = true; }
        if (isSat && m.day === "السبت 18 رمضان") { todayH += card; inT = true; }

        if (m.type === "up" && !inT) {
            if (!upDays.includes(m.day)) { upH += `<span class="day-header">${m.day}</span>`; upDays.push(m.day); }
            upH += card;
        } else if (m.type === "ar") {
            if (!arDays.includes(m.day)) { arH += `<span class="day-header">${m.day}</span>`; arDays.push(m.day); }
            arH += card;
        }
    });

    document.getElementById('today-area').innerHTML = todayH || `<div style="text-align:center; padding:50px; color:#555;">لا توجد مباريات جارية الآن</div>`;
    document.getElementById('upcoming-area').innerHTML = upH;
    document.getElementById('archive-area').innerHTML = arH;
}

function openTab(evt, tabName) {
    let i, tabcontent = document.getElementsByClassName("tab-content"), tablinks = document.getElementsByClassName("tab-btn");
    for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
    for (i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
}
window.onload = init;
</script>
</body>
</html>
