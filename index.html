<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بطولة القحمة الرمضانية 28</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #1976d2; --light-blue: #64b5f6; --bg: #1a1c1e; --gray-card: rgba(255, 255, 255, 0.04); --text-main: #eee; --text-muted: #aaa; --gold: #ffd700; --green: #25D366; }
        body { background-color: var(--bg); color: var(--text-main); font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--blue); margin-bottom: 15px; }
        header h1 { color: var(--blue); font-weight: 900; margin: 0; font-size: 1.5rem; }
        
        /* قسم الطقس */
        .weather-bar { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; text-align: center; margin-bottom: 15px; font-size: 0.85rem; border: 1px solid rgba(100,181,246,0.2); }
        .weather-bar span { color: var(--light-blue); font-weight: bold; }

        .top-stats { display: flex; justify-content: center; align-items: center; margin-bottom: 15px; }
        .views-count { background: var(--gray-card); padding: 6px 20px; border-radius: 20px; border: 1px solid rgba(25,118,210,0.2); font-size: 0.9rem; }
        
        .tabs-nav { display: flex; justify-content: space-around; background: var(--gray-card); padding: 8px; border-radius: 12px; margin-bottom: 20px; border: 1px solid rgba(25,118,210,0.2); overflow-x: auto; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-family: 'Cairo'; cursor: pointer; font-weight: bold; padding: 8px 15px; border-radius: 8px; transition: 0.3s; white-space: nowrap; font-size: 0.85rem; }
        .tab-btn.active { background: var(--blue); color: white; }
        
        .tab-content { display: none; animation: fadeIn 0.4s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* تنسيق المجموعات الكامل */
        .group-card { background: var(--gray-card); border-radius: 12px; overflow: hidden; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .group-header { background: rgba(25, 118, 210, 0.15); color: var(--blue); padding: 12px; font-weight: 900; border-bottom: 1px solid rgba(25,118,210,0.2); }
        .group-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; text-align: center; }
        .group-table th { background: rgba(0,0,0,0.2); padding: 10px 2px; color: var(--light-blue); }
        .group-table td { padding: 12px 2px; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .team-name-cell { text-align: right; padding-right: 15px !important; font-weight: bold; width: 30%; }

        .match-card { background: var(--gray-card); border-radius: 12px; overflow: hidden; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03); padding-bottom: 10px; }
        .teams { display: flex; justify-content: space-between; align-items: center; padding: 15px 15px 5px 15px; }
        .team { width: 42%; text-align: center; font-weight: bold; font-size: 0.95rem; }
        .vs { color: var(--blue); font-weight: 900; font-size: 1.1rem; }
        .day-header { background: rgba(25,118,210,0.2); color: white; padding: 4px 12px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; margin: 12px 0 8px; display: inline-block; border: 1px solid var(--blue); }
        
        .footer { text-align: center; padding: 30px 20px; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 20px; }
        .contact-num { color: var(--green); font-weight: 900; font-size: 1rem; display: block; margin-top: 10px; direction: ltr; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>بطولة القحمة الرمضانية 28</h1>
            <div style="font-size: 0.8rem; color: var(--text-muted); margin-top:5px;">ملعب الوسم بالقحمة</div>
        </header>

        <div class="weather-bar">
            🌤️ حالة الطقس في القحمة الآن: <span>28°C - صافي</span>
        </div>

        <div class="top-stats">
            <div class="views-count">👁️ المشاهدات: 8147</div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab(event, 'today')">اليوم</button>
            <button class="tab-btn" onclick="openTab(event, 'groups')">المجموعات</button>
            <button class="tab-btn" onclick="openTab(event, 'upcoming')">النهائيات</button>
            <button class="tab-btn" onclick="openTab(event, 'previous')">الأرشيف</button>
        </div>

        <div id="today" class="tab-content active"><div id="today-area"></div></div>
        <div id="upcoming" class="tab-content"><div id="upcoming-area"></div></div>
        <div id="previous" class="tab-content"><div id="archive-area"></div></div>

        <div id="groups" class="tab-content">
            <script>
                const fullGroups = [
                    { n: "1", teams: [{ t: "السوق", l: 2, f: 2, d: 0, x: 0, pts: 6 }, { t: "الفيض", l: 2, f: 0, d: 1, x: 1, pts: 1 }, { t: "جندلة", l: 2, f: 0, d: 1, x: 1, pts: 1 }] },
                    { n: "2", teams: [{ t: "ساحل مغزل", l: 2, f: 2, d: 0, x: 0, pts: 6 }, { t: "البرك", l: 2, f: 1, d: 0, x: 1, pts: 3 }, { t: "وحدة الرقة", l: 2, f: 0, d: 0, x: 2, pts: 0 }] },
                    { n: "3", teams: [{ t: "الصقر", l: 2, f: 2, d: 0, x: 0, pts: 6 }, { t: "عمق", l: 2, f: 1, d: 0, x: 1, pts: 3 }, { t: "العرق", l: 2, f: 0, d: 0, x: 2, pts: 0 }] },
                    { n: "4", teams: [{ t: "الساحل الرياضي", l: 2, f: 2, d: 0, x: 0, pts: 6 }, { t: "مستقبل عرمرم", l: 2, f: 1, d: 0, x: 1, pts: 3 }, { t: "السلطان", l: 2, f: 0, d: 0, x: 2, pts: 0 }] },
                    { n: "5", teams: [{ t: "الوسام", l: 2, f: 2, d: 0, x: 0, pts: 6 }, { t: "الفيصلي", l: 2, f: 1, d: 0, x: 1, pts: 3 }, { t: "خليج الصوالحة", l: 2, f: 0, d: 0, x: 2, pts: 0 }] },
                    { n: "6", teams: [{ t: "صقلية", l: 2, f: 1, d: 1, x: 0, pts: 4 }, { t: "دبسا", l: 2, f: 1, d: 1, x: 0, pts: 4 }, { t: "عرمرم", l: 2, f: 0, d: 0, x: 2, pts: 0 }] }
                ];

                document.write(fullGroups.map(g => `
                    <div class="group-card">
                        <div class="group-header">المجموعة ${g.n}</div>
                        <table class="group-table">
                            <thead>
                                <tr><th class="team-name-cell">الفريق</th><th>ل</th><th>ف</th><th>ت</th><th>خ</th><th>نقاط</th></tr>
                            </thead>
                            <tbody>
                                ${g.teams.map(t => `
                                    <tr>
                                        <td class="team-name-cell">${t.t}</td>
                                        <td>${t.l}</td><td>${t.f}</td><td>${t.d}</td><td>${t.x}</td>
                                        <td style="color:var(--blue); font-weight:bold;">${t.pts}</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                `).join(''));
            </script>
        </div>

        <div class="footer">
            <div class="disclaimer-box">
                <p style="font-weight:bold; color:var(--blue);">تطوير وتصميم: إياد عسيري</p>
                <p>مجهود شخصي لتنظيم نتائج بطولة القحمة 28</p>
                <a href="https://wa.me/966534987428" class="contact-num">0534987428</a>
            </div>
        </div>
    </div>

    <script>
        const matchesData = [
            // مباريات الليلة والنهائيات
            { date: "2026-03-02", day: "الاثنين 13 رمضان", t1: "عمق", t2: "مستقبل عرمرم", info: "10:30 م", result: "VS" },
            { date: "2026-03-02", day: "الاثنين 13 رمضان", t1: "الفيصلي", t2: "دبسا", info: "12:30 ص", result: "VS" },
            { date: "2026-03-04", day: "الأربعاء 15 رمضان", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "ربع النهائي", result: "VS" },
            { date: "2026-03-11", day: "المباراة النهائية", t1: "يحدد لاحقاً", t2: "يحدد لاحقاً", info: "🏆 النهائي", result: "VS" },

            // الأرشيف الكامل
            { date: "2026-03-01", day: "الأحد 12 رمضان", t1: "صقلية", t2: "عرمرم", info: "انتهت", result: "4 - 1" },
            { date: "2026-03-01", day: "الأحد 12 رمضان", t1: "الفيصلي", t2: "الوسام", info: "انتهت", result: "0 - 1" },
            { date: "2026-02-28", day: "السبت 11 رمضان", t1: "الصقر", t2: "العرق", info: "انتهت", result: "1 - 0" },
            { date: "2026-02-28", day: "السبت 11 رمضان", t1: "البرك", t2: "ساحل مغزل", info: "انتهت", result: "0 - 1" },
            { date: "2026-02-27", day: "الجمعة 10 رمضان", t1: "جندلة", t2: "الفيض", info: "انتهت", result: "2 - 2" },
            { date: "2026-02-26", day: "الخميس 09 رمضان", t1: "الساحل الرياضي", t2: "السلطان", info: "انتهت", result: "2 - 1" },
            { date: "2026-02-24", day: "الثلاثاء 07 رمضان", t1: "السوق", t2: "الفيض", info: "انتهت", result: "1 - 0" },
            { date: "2026-02-23", day: "الاثنين 06 رمضان", t1: "الوسام", t2: "الخليج", info: "انتهت", result: "4 - 1" },
            { date: "2026-02-21", day: "السبت 04 رمضان", t1: "السوق", t2: "جندلة", info: "انتهت", result: "2 - 0" }
        ];

        function runTournamentSystem() {
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0];
            let sections = { today: {}, upcoming: {}, archive: {} };

            matchesData.forEach(m => {
                let target = m.date === todayStr ? 'today' : (m.date > todayStr ? 'upcoming' : 'archive');
                if (!sections[target][m.day]) sections[target][m.day] = "";
                sections[target][m.day] += `<div class="match-card"><div class="teams"><span class="team">${m.t1}</span><span class="vs">${m.result}</span><span class="team">${m.t2}</span></div><center><small style="color:var(--text-muted);">${m.info}</small></center></div>`;
            });

            const render = (obj) => Object.keys(obj).map(day => `<div><div class="day-header">${day}</div>${obj[day]}</div>`).join('');
            document.getElementById('today-area').innerHTML = render(sections.today) || "<center><br>لا توجد مباريات لليوم</center>";
            document.getElementById('upcoming-area').innerHTML = render(sections.upcoming);
            document.getElementById('archive-area').innerHTML = render(sections.archive);
        }

        function openTab(evt, tabName) {
            var tabcontent = document.getElementsByClassName("tab-content");
            var tablinks = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            for (let i = 0; i < tablinks.length; i++) tablinks[i].classList.remove("active");
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.classList.add("active");
        }
        window.onload = runTournamentSystem;
    </script>
</body>
</html>
